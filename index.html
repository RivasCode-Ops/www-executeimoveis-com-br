          "name": "Quanto custa regularizar um imóvel?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O custo varia conforme o tipo de serviço e a complexidade do caso. Após o diagnóstico inicial gratuito, apresentamos uma proposta transparente com todos os valores envolvidos, sem surpresas."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto tempo leva para regularizar um imóvel?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O prazo varia conforme o tipo de serviço. Uma retificação de matrícula simples pode ser concluída em 30 a 60 dias. Um processo de usucapião extrajudicial costuma levar de 3 a 8 meses. Inventários variam entre 2 e 6 meses."
          }
        },
        {
          "@type": "Question",
          "name": "Quais documentos são necessários?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Depende do caso, mas geralmente pedimos comprovante de posse ou ocupação, documentos de identidade dos titulares, certidões de óbito quando há herança, e dados cadastrais do imóvel. Fazemos a lista completa na primeira reunião."
          }
        },
        {
          "@type": "Question",
          "name": "Dá para resolver sem ação judicial?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim, em muitos casos. Retificações de matrícula, usucapião extrajudicial e partilhas amigáveis podem ser resolvidos em cartório, sem necessidade de processo judicial, o que agiliza e reduz custos."
          }
        },
        {
          "@type": "Question",
          "name": "Atendem imóveis rurais?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Regularizamos imóveis urbanos e rurais em todo o Piauí, incluindo regularização junto ao INCRA quando necessário."
          }
        },
        {
          "@type": "Question",
          "name": "Atendem todo o Piauí?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Embora nossa base seja em Picos, atendemos clientes em todo o estado do Piauí, com suporte presencial e remoto conforme a necessidade de cada caso."
          }
        },
        {
          "@type": "Question",
          "name": "Posso regularizar imóvel herdado?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. O inventário e a partilha são etapas comuns para regularizar imóveis herdados. Trabalhamos para que o processo seja o mais ágil e tranquilo possível para os herdeiros."
          }
        },
        {
          "@type": "Question",
          "name": "Quem só tem contrato pode regularizar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. A partir do contrato de compra e venda, é possível iniciar o processo de regularização. Avaliamos o contrato e definimos a melhor estratégia para levar o imóvel até o registro definitivo."
          }
        }
